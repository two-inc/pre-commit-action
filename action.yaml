name: Pre-commit
description: Run pre-commit hooks against the PR diff and post a sticky comment with the result.

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.12"
  github-token:
    description: Token used to post the sticky PR comment
    required: false
    default: ${{ github.token }}
  node-version:
    description: |
      If set, install Node.js of this version and install node dependencies (via
      npm ci / pnpm install / yarn install, auto-detected from the lockfile) before
      pre-commit. Needed for hybrid Python+Node repos where hooks (e.g. prettier v3
      + ESM plugins like prettier-plugin-svelte) resolve imports from repo-root
      node_modules.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache pre-commit hook environments
      uses: actions/cache@v5
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ runner.os }}-py${{ inputs.python-version }}-${{ hashFiles('.pre-commit-config.yaml') }}
        restore-keys: |
          pre-commit-${{ runner.os }}-py${{ inputs.python-version }}-

    - if: inputs.node-version != ''
      id: detect-pm
      shell: bash
      run: |
        if [ -f pnpm-lock.yaml ]; then
          echo "pm=pnpm" >> "$GITHUB_OUTPUT"
        elif [ -f yarn.lock ]; then
          echo "pm=yarn" >> "$GITHUB_OUTPUT"
        else
          echo "pm=npm" >> "$GITHUB_OUTPUT"
        fi

    # Only let setup-node@v5 auto-cache npm. pnpm/yarn need a corepack shim on
    # PATH before setup-node can resolve their cache dirs, but corepack ships
    # with node itself — we can't reliably enable it before setup-node on
    # self-hosted runners that don't pre-install node. So we skip the
    # package-manager-cache for pnpm/yarn and use a manual node_modules cache.
    - if: inputs.node-version != ''
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        # Only auto-cache for npm. pnpm/yarn need their binary on PATH for
        # setup-node to resolve the cache dir, and corepack ships inside node
        # itself — we can't reliably enable corepack before setup-node on
        # self-hosted runners that don't pre-install node. We use a manual
        # actions/cache@v5 for pnpm/yarn instead.
        package-manager-cache: ${{ steps.detect-pm.outputs.pm == 'npm' }}

    - if: inputs.node-version != '' && steps.detect-pm.outputs.pm != 'npm'
      name: Cache node_modules (${{ steps.detect-pm.outputs.pm }})
      uses: actions/cache@v5
      with:
        path: node_modules
        key: ${{ runner.os }}-${{ steps.detect-pm.outputs.pm }}-node${{ inputs.node-version }}-${{ hashFiles('pnpm-lock.yaml', 'yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ steps.detect-pm.outputs.pm }}-node${{ inputs.node-version }}-

    - if: inputs.node-version != ''
      name: Install node dependencies
      shell: bash
      run: |
        case "${{ steps.detect-pm.outputs.pm }}" in
          pnpm)
            corepack enable
            pnpm install --frozen-lockfile
            ;;
          yarn)
            corepack enable
            if [ -f .yarnrc.yml ]; then
              yarn install --immutable
            else
              yarn install --frozen-lockfile
            fi
            ;;
          npm)
            npm ci
            ;;
        esac

    - name: Run pre-commit
      id: pre-commit
      shell: bash
      continue-on-error: true
      env:
        PIP_EXTRA_INDEX_URL: https://europe-python.pkg.dev/tillit-api/two-pypi/simple/
      run: |
        set +e -o pipefail
        uvx pre-commit run --from-ref origin/${{ github.base_ref }} --to-ref HEAD --show-diff-on-failure | tee pre-commit-output
        exit_code=$?
        set -e +o pipefail
        echo "EXIT_CODE=$exit_code" >> "$GITHUB_OUTPUT"
        exit $exit_code

    # Read pre-commit-output from disk rather than splicing it into the script
    # source via `${{ steps.pre-commit.outputs.OUTPUT }}`. Inlined templates of
    # unbounded user output are passed to node24 as argv and blow past the
    # Linux ARG_MAX (~128KB) on large diffs, killing the step with E2BIG before
    # any code runs. Middle-truncating to a safe ceiling preserves both the
    # headline failure (start) and the final summary (end), since the dense
    # middle is the most compressible part.
    - name: Render comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v9
      env:
        PRE_COMMIT_EXIT_CODE: ${{ steps.pre-commit.outputs.EXIT_CODE }}
        PRE_COMMIT_OUTCOME: ${{ steps.pre-commit.outcome }}
        PRE_COMMIT_BASE_REF: ${{ github.base_ref }}
        PRE_COMMIT_ACTOR: ${{ github.actor }}
      with:
        script: |
          const fs = require('fs');
          const MAX_OUTPUT_BYTES = 60 * 1024;
          const outcome = process.env.PRE_COMMIT_OUTCOME;
          const exitCode = process.env.PRE_COMMIT_EXIT_CODE;
          const baseRef = process.env.PRE_COMMIT_BASE_REF;
          const actor = process.env.PRE_COMMIT_ACTOR;
          const emoji = outcome === 'success' ? '🏆' : '🚫';
          let output = '';
          try {
            output = fs.readFileSync('pre-commit-output', 'utf8');
          } catch (err) {
            output = `(failed to read pre-commit-output: ${err.message})`;
          }
          // Middle-truncate: both the start (which hook failed, headline error)
          // and the tail (final summary, exit context) are usually load-bearing.
          // The dense middle (per-file diffs, line-by-line lint chatter) is the
          // most compressible part.
          const buf = Buffer.from(output, 'utf8');
          if (buf.length > MAX_OUTPUT_BYTES) {
            const half = Math.floor((MAX_OUTPUT_BYTES - 80) / 2);
            const removed = buf.length - 2 * half;
            const head = buf.slice(0, half).toString('utf8');
            const tail = buf.slice(buf.length - half).toString('utf8');
            output = `${head}\n\n... [truncated ${removed} bytes from the middle] ...\n\n${tail}`;
          }
          const escaped = output.replace(/`/g, '\\`');
          const hint = outcome === 'success' ? '' : `
          Looks like the PR is missing pre-commit changes. Please run the following locally and commit changes to fix this issue:

          \`\`\`
          pre-commit install  # only if you do not have it installed already
          git fetch origin
          pre-commit run --from-ref origin/${baseRef} --to-ref HEAD
          git commit -a
          git push
          \`\`\`
          `;
          const body = `# 🖌 Pre-commit ${outcome} ${emoji}

          ${hint}

          <details><summary>Details</summary>

          \`\`\`
          ${escaped}
          \`\`\`

          Exit code: ${exitCode}

          </details>

          Author ✍️@${actor}`;
          fs.writeFileSync('pre-commit-comment.md', body);

    - name: Post sticky PR comment
      if: github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v3
      with:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        header: pre-commit
        path: pre-commit-comment.md

    - name: Report pre-commit status
      shell: bash
      run: exit ${{ steps.pre-commit.outputs.EXIT_CODE }}
