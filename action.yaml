name: Pre-commit
description: Run pre-commit hooks against the PR diff and post a sticky comment with the result.

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.12"
  uv-group:
    description: uv dependency group to sync before running pre-commit
    required: false
    default: dev
  github-token:
    description: Token used to post the sticky PR comment
    required: false
    default: ${{ github.token }}
  gcp-service-account:
    description: GCP service account with Artifact Registry read access
    required: false
    default: ${{ vars.GCP_ARTIFACT_REGISTRY_WRITER_SA_NAME }}
  workload-identity-provider:
    description: Workload Identity Federation provider (full path)
    required: false
    default: ${{ vars.WORKLOAD_IDENTITY_PROVIDER_PREFIX }}/${{ github.event.repository.name }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: astral-sh/setup-uv@v7
      with:
        version: latest

    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        token_format: access_token
        service_account: ${{ inputs.gcp-service-account }}
        workload_identity_provider: ${{ inputs.workload-identity-provider }}

    - name: Install dependencies
      shell: bash
      run: uv sync --group ${{ inputs.uv-group }}

    - name: Run pre-commit
      id: pre-commit
      shell: bash
      continue-on-error: true
      run: |
        set +e -o pipefail
        uv run pre-commit run --from-ref origin/${{ github.base_ref }} --to-ref HEAD --show-diff-on-failure | tee pre-commit-output
        exit_code=$?
        set -e +o pipefail
        {
          echo "EXIT_CODE=$exit_code"
          echo 'OUTPUT<<EOL'
          sed 's/`/\\`/g' pre-commit-output
          echo 'EOL'
        } >> "$GITHUB_OUTPUT"
        exit $exit_code

    - name: Render comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const outcome = '${{ steps.pre-commit.outcome }}';
          const emoji = outcome === 'success' ? '🏆' : '🚫';
          const hint = outcome === 'success' ? '' : `
          Looks like the PR is missing pre-commit changes. Please run the following locally and commit changes to fix this issue:

          \`\`\`
          pre-commit install  # only if you do not have it installed already
          git fetch origin
          pre-commit run --from-ref origin/${{ github.base_ref }} --to-ref HEAD
          git commit -a
          git push
          \`\`\`
          `;
          const body = `# 🖌 Pre-commit ${outcome} ${emoji}

          ${hint}

          <details><summary>Details</summary>

          \`\`\`
          ${{ steps.pre-commit.outputs.OUTPUT }}
          \`\`\`

          Exit code: ${{ steps.pre-commit.outputs.EXIT_CODE }}

          </details>

          Author ✍️@${{ github.actor }}`;
          fs.writeFileSync('pre-commit-comment.md', body);

    - name: Post sticky PR comment
      if: github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        header: pre-commit
        path: pre-commit-comment.md

    - name: Report pre-commit status
      shell: bash
      run: exit ${{ steps.pre-commit.outputs.EXIT_CODE }}
