name: Pre-commit
description: Run pre-commit hooks against the PR diff and post a sticky comment with the result.

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.12"
  github-token:
    description: Token used to post the sticky PR comment
    required: false
    default: ${{ github.token }}
  node-version:
    description: |
      If set, install Node.js of this version and install node dependencies (via
      npm ci / pnpm install / yarn install, auto-detected from the lockfile) before
      pre-commit. Needed for hybrid Python+Node repos where hooks (e.g. prettier v3
      + ESM plugins like prettier-plugin-svelte) resolve imports from repo-root
      node_modules.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache pre-commit hook environments
      uses: actions/cache@v4
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ runner.os }}-py${{ inputs.python-version }}-${{ hashFiles('.pre-commit-config.yaml') }}
        restore-keys: |
          pre-commit-${{ runner.os }}-py${{ inputs.python-version }}-

    - if: inputs.node-version != ''
      id: detect-pm
      shell: bash
      run: |
        if [ -f pnpm-lock.yaml ]; then
          echo "pm=pnpm" >> "$GITHUB_OUTPUT"
        elif [ -f yarn.lock ]; then
          echo "pm=yarn" >> "$GITHUB_OUTPUT"
        else
          echo "pm=npm" >> "$GITHUB_OUTPUT"
        fi

    - if: inputs.node-version != ''
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        # Only let setup-node auto-cache npm — pnpm/yarn require corepack
        # shims on PATH to resolve cache paths, and corepack only arrives
        # with setup-node itself (chicken-and-egg on self-hosted runners).
        cache: ${{ steps.detect-pm.outputs.pm == 'npm' && 'npm' || '' }}

    - if: inputs.node-version != '' && steps.detect-pm.outputs.pm != 'npm'
      name: Cache node_modules (${{ steps.detect-pm.outputs.pm }})
      uses: actions/cache@v4
      with:
        path: node_modules
        key: ${{ runner.os }}-${{ steps.detect-pm.outputs.pm }}-node${{ inputs.node-version }}-${{ hashFiles('pnpm-lock.yaml', 'yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ steps.detect-pm.outputs.pm }}-node${{ inputs.node-version }}-

    - if: inputs.node-version != ''
      name: Install node dependencies
      shell: bash
      run: |
        case "${{ steps.detect-pm.outputs.pm }}" in
          pnpm)
            corepack enable
            pnpm install --frozen-lockfile
            ;;
          yarn)
            corepack enable
            if [ -f .yarnrc.yml ]; then
              yarn install --immutable
            else
              yarn install --frozen-lockfile
            fi
            ;;
          npm)
            npm ci
            ;;
        esac

    - name: Run pre-commit
      id: pre-commit
      shell: bash
      continue-on-error: true
      env:
        PIP_EXTRA_INDEX_URL: https://europe-python.pkg.dev/tillit-api/two-pypi/simple/
      run: |
        set +e -o pipefail
        uvx pre-commit run --from-ref origin/${{ github.base_ref }} --to-ref HEAD --show-diff-on-failure | tee pre-commit-output
        exit_code=$?
        set -e +o pipefail
        {
          echo "EXIT_CODE=$exit_code"
          echo 'OUTPUT<<EOL'
          sed 's/`/\\`/g' pre-commit-output
          echo 'EOL'
        } >> "$GITHUB_OUTPUT"
        exit $exit_code

    - name: Render comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const outcome = '${{ steps.pre-commit.outcome }}';
          const emoji = outcome === 'success' ? '🏆' : '🚫';
          const hint = outcome === 'success' ? '' : `
          Looks like the PR is missing pre-commit changes. Please run the following locally and commit changes to fix this issue:

          \`\`\`
          pre-commit install  # only if you do not have it installed already
          git fetch origin
          pre-commit run --from-ref origin/${{ github.base_ref }} --to-ref HEAD
          git commit -a
          git push
          \`\`\`
          `;
          const body = `# 🖌 Pre-commit ${outcome} ${emoji}

          ${hint}

          <details><summary>Details</summary>

          \`\`\`
          ${{ steps.pre-commit.outputs.OUTPUT }}
          \`\`\`

          Exit code: ${{ steps.pre-commit.outputs.EXIT_CODE }}

          </details>

          Author ✍️@${{ github.actor }}`;
          fs.writeFileSync('pre-commit-comment.md', body);

    - name: Post sticky PR comment
      if: github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        header: pre-commit
        path: pre-commit-comment.md

    - name: Report pre-commit status
      shell: bash
      run: exit ${{ steps.pre-commit.outputs.EXIT_CODE }}
